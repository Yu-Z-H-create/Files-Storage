<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>PDF 在线预览</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        /* 让页面全屏，去掉滚动条 */
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #333; /* 深色背景 */
        }
        
        /* 让 iframe 占满整个屏幕 */
        #pdfViewer {
            width: 100vw;
            height: 100vh;
            border: none;
            display: block;
        }
        
        /* 隐藏顶部标题栏（可选，为了更干净的预览） */
        .header {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            background: #2c3e50;
            color: white;
            padding: 5px 10px;
            z-index: 1000;
            font-family: sans-serif;
            font-size: 14px;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="header">PDF 预览 - 阳光跑资料库</div>
    
    <!-- 这里是放 PDF 的地方 -->
    <iframe id="pdfViewer" src=""></iframe>

    <script>
        // 获取浏览器地址栏里的 ?pdf=后面的内容
        const urlParams = new URLSearchParams(window.location.search);
        let fileName = urlParams.get('pdf');

        // 获取显示区域
        const viewer = document.getElementById('pdfViewer');

        if (fileName) {
            // 1. 进行网址编码（防止中文乱码导致找不到文件）
            let encodedName = encodeURIComponent(fileName);
            
            // 2. 拼凑出正确的 GitHub Raw 直链
            // 注意：这里必须加上 https://raw.githubusercontent.com/ 前缀
            let fileUrl = 'https://raw.githubusercontent.com/Yu-Z-H-create/Files-Storage/main/' + encodedName;
            
            // 3. 把链接塞进 iframe 里
            viewer.src = fileUrl;
        } else {
            viewer.srcdoc = "<h1 style='color:white;text-align:center;margin-top:20%;'>请在链接后面加上 ?pdf=文件名.pdf</h1>";
        }
    </script>
</body>
</html>
